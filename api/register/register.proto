syntax = "proto3";

package register;

option go_package = "github.com/Ks89/home-anthill/api-devices/register";

service Registration {
  rpc Register (RegisterRequest) returns (RegisterReply) {}
}

message RegisterFeature {
  string featureUuid = 1;
  string featureName = 2;
  bool enable = 3;
  int64 order = 4;
  string unit = 5;
}

message RegisterRequest {
  string id = 1;
  string uuid = 2; // device uuid
  string mac = 3;
  string manufacturer = 4;
  string model = 5;
  string profileOwnerId = 6;
  string apiToken = 7;
  RegisterFeature feature = 8;
}

message RegisterReply {
  string status = 1;
  string message = 2;
}