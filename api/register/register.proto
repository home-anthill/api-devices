syntax = "proto3";

package register;

option go_package = "api-devices/api/register";

service Registration {
  rpc Register (RegisterRequest) returns (RegisterReply) {}
}

message RegisterFeature {
  string feature_uuid = 1;
  string feature_name = 2;
}

message RegisterRequest {
  string device_uuid = 1;
  string mac = 2;
  string manufacturer = 3;
  string model = 4;
  string profile_owner_id = 5;
  string api_token = 6;
  RegisterFeature feature = 7;
}

message RegisterReply {
  string status = 1;
  string message = 2;
}
