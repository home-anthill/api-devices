syntax = "proto3";

package device;

option go_package = "api-devices/api/device";

service Device {
  rpc GetValue (GetValueRequest) returns (GetValueResponse) {}
  rpc SetValues (SetValuesRequest) returns (SetValueResponse) {}
}

message GetValueRequest {
  reserved 1;
  string device_uuid = 2;
  string feature_uuid = 3;
  string feature_name = 4;
  string mac = 5;
  string api_token = 6;
}

message GetValueResponse {
  string feature_uuid = 1;
  string feature_name = 2;
  float value = 3;
  int64 created_at = 4;
  int64 modified_at = 5;
}

message SetValuesRequest {
  reserved 1;
  string device_uuid = 2;
  string mac = 3;
  string api_token = 4;
  repeated SetValueRequest feature_values = 5;
}

message SetValueRequest {
  string feature_uuid = 1;
  string feature_name = 2;
  float value = 3;
}

message SetValueResponse {
  string status = 1;
  string message = 2;
}
